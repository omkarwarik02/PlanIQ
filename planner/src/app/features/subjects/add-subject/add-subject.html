<div class="container">
  <div class="header">
<h1>My Curriculum</h1>
</div>
<div class="sub-headrer">

  <div class="text-content">
    <small>Organize your academic journey. Select subjects to include</small>
    <small>in your intelligent study plan and categorize them for better</small>
    <small>focus.</small>
  </div>

  <div class="create-sub-btn">
    <p-button severity="info">Create Group</p-button>
  </div>

</div>

<div class="body">
<div class="body-heading">
<h2>Subjects</h2>
<div class="line"></div>
</div>
<div class="card-grid">
  <div class="sub-card" *ngFor="let subject of subjects">
 <h3>{{ subject.name }}</h3>
    <p>{{ subject.description }}</p>
  </div>

</div>
</div>
</div>
