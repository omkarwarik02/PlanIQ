<div class="container">
    <div class="greet-div">
        <h1>Hello Dashboard</h1>
        <small>Welcome back! Here's your study overview</small>
    </div>
<div class="stats-div">
    
        <div class="stat-card">
            <div class="logo">
                <i class="pi pi-book"></i>
                 <h1>Subjects</h1>
            </div>
            <div class="stats">
                <h1>{{totalSubjects()}}</h1>
                <small>active subject</small>
            </div>
        </div>
    
    <div class="study-div">
         <div class="stat-card">
            <div class="logo">
                <i class="pi pi-clock"></i>
                <h1>Study Hours</h1>
            </div>
            <div class="stats">
                <h1>{{totalHours()}}<span>hrs/day</span></h1>
                <small>total allocated</small>
            </div>
         </div>
    </div>
    <div class="task-div">
         <div class="stat-card">
            <div class="logo">
                <i class="pi pi-check-square"></i>
                <h1>Total Tasks</h1>
            </div>
            <div class="stats">
                <h1>{{totaltasks()}}</h1>
                <small>recent tasks</small>
            </div>
         </div>
    </div>
    <div class="aiUsage-div">
         <div class="stat-card">
            <div class="logo">
                <i class="pi pi-percentage"></i>
                <h1>Ai Usage</h1>
            </div>
            <div class="stats">
                <h1>{{aiUsageCount()}}</h1>
                <small>Utilization</small>
            </div>
         </div>
    </div>
</div>
</div>
