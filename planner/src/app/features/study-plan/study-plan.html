<p-table [value]="tableRows()">
  <ng-template pTemplate="header">
    <tr>
      <th>Day</th>
      <th>Subject</th>
      <th>Duration</th>
      <th>Focus</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-row>
    <tr>
      <td *ngIf="row.isFirst" [attr.rowspan]="row.rowspan">
        {{ row.day }}
      </td>
      <td>{{ row.subject }}</td>
      <td>{{ row.duration }}</td>
      <td>{{ row.focus }}</td>
    </tr>
  </ng-template>
</p-table>
