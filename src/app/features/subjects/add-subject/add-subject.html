<div class="container">
    
<mat-card class="subject-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="heading"></div>
    <mat-card-title>Add Subject</mat-card-title>
  </mat-card-header>

  <form [formGroup]="subjectForm">

  <mat-card-content>

   <mat-form-field class="input-1">
  <mat-label>Subject Name</mat-label>
  <input matInput formControlName="subjectName">
</mat-form-field>

<mat-form-field class="input-2">
  <mat-label>Select</mat-label>
  <mat-select formControlName="difficulty">
    <mat-option value="easy">Easy</mat-option>
    <mat-option value="medium">Medium</mat-option>
    <mat-option value="hard">Hard</mat-option>
  </mat-select>
</mat-form-field>

<mat-form-field class="input-3">
  <mat-label>Hours Needed</mat-label>
  <input matInput type="number" formControlName="hoursPerDay">
</mat-form-field>

  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="addSubjects()">
      Add Subject
    </button>
  </mat-card-actions>

  </form>

</mat-card>

</div>
